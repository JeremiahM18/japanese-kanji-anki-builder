name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_verify:
    name: Release Verify Ubuntu Node 22
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install sqlite3 packaging tool
        run: sudo apt-get update && sudo apt-get install --yes sqlite3

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run release gate
        run: npm run release:gate -- --root-dir=.release-gate --keep-temp-dir --require-apkg-tools

      - name: Upload release gate verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ github.ref_name }}
          path: .release-gate/out
          if-no-files-found: error

  release_bundle:
    name: Release Bundle Ubuntu Node 22
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - release_verify
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install sqlite3 packaging tool
        run: sudo apt-get update && sudo apt-get install --yes sqlite3

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic smoke packaging
        run: npm run ci:smoke -- --root-dir=.release-smoke --keep-temp-dir

      - name: Run release gate
        run: npm run release:gate -- --root-dir=.release-gate --keep-temp-dir --require-apkg-tools

      - name: Generate artifact checksums
        run: |
          find .release-smoke/out .release-gate/out -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-artifacts.sha256

      - name: Upload tagged release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.ref_name }}
          path: |
            .release-smoke/out
            .release-gate/out
            CHANGELOG.md
            docs/branch-protection.md
            docs/release-process.md
            release-artifacts.sha256
          if-no-files-found: error
